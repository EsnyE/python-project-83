{% extends 'layout.html' %}

{% block title %}Анализатор страниц - Главная{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <h1 class="card-title text-center mb-4">Анализатор страниц</h1>
                    <p class="lead text-center text-muted mb-4">Бесплатная проверка сайтов на SEO-пригодность</p>
                    
                    <form action="{{ url_for('add_url') }}" method="post" class="mb-4">
                        <div class="mb-3">
                            <label for="url" class="form-label visually-hidden">URL для проверки</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text">🔗</span>
                                <input type="url" 
                                       class="form-control" 
                                       id="url" 
                                       name="url" 
                                       placeholder="https://www.example.com"
                                       value="{{ url|default('') }}"
                                       required>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Проверить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
