{% extends 'layout.html' %}

{% block title %}Детали проверки{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Детали проверки #{{ url.id }}</h1>
    <p>URL: {{ url.name }}</p>
    <p class="text-muted">Подробная информация будет доступна после подключения базы данных</p>
    <a href="{{ url_for('urls') }}" class="btn btn-primary">← Назад к списку</a>
</div>
{% endblock %}
